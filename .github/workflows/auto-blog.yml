name: Auto Blog Post Twice Daily

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC every day
    - cron: '0 19 * * *'  # 7 PM UTC every day
  workflow_dispatch:        # Manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Morning Post
        if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POST_OFFSET: '0'
        run: python generate_post.py

      - name: Generate Evening Post
        if: github.event.schedule == '0 19 * * *'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POST_OFFSET: '1'
        run: python generate_post.py
        
      - name: Commit and Push
        run: |
          git config user.name "BlogBot"
          git config user.email "bot@blog.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "Auto post $(date +'%Y-%m-%d %H:%M')"
          git push
